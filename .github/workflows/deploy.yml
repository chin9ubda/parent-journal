name: Build & Push to Docker Hub

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push backend
        run: |
          docker build -t chanki87/parent-journal-backend:latest ./backend
          docker push chanki87/parent-journal-backend:latest

      - name: Build and push frontend
        run: |
          docker build -t chanki87/parent-journal-frontend:latest ./frontend
          docker push chanki87/parent-journal-frontend:latest

      - name: Deploy locally
        run: |
          docker stop pj_backend pj_frontend || true
          docker rm pj_backend pj_frontend || true
          cd /data/docker/parent-journal && docker compose pull && docker compose up -d
